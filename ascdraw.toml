font-family = "SF Mono"
font-size = 12.0
transparent-menubar = true

[cell]
underline-offset = 0.0

[display.cursor-shape]
# normal = "block"
# insert = "beam"
# replace = "underline"

[theme.default]
fg = "black"
bg = "white"

[theme.cursor]
fg = "white"
bg = "black"

[macos]
color-space = "p3"

[keys]
font-scale-up = "Cmd-="
font-scale-down = "Cmd--"
font-scale-reset = "Cmd-0"
window-new = "Cmd-N"
window-close = "Cmd-W"
