#font-family = "SF Mono"
font-family = "Jetbrains Mono Nerd Font"

font-size = 12.0
transparent-menubar = true

[cell]
underline-offset = 0.0

[display.cursor-shape]
# move-draw = "block"
# insert = "beam"
# replace = "underline"

[jump]
inactivity-ms = 500

[macos]
color-space = "p3"

[keys]
font-scale-up = "Cmd-="
font-scale-down = "Cmd--"
font-scale-reset = "Cmd-0"
window-new = "Cmd-N"
window-close = "Cmd-W"
